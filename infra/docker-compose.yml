name: hexaloop

services:
  postgres:
    image: postgres:16-alpine
    container_name: hexaloop-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hexaloop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hexaloop}
      POSTGRES_DB: ${POSTGRES_DB:-hexaloop}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - hexaloop-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hexaloop} -d ${POSTGRES_DB:-hexaloop}"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: hexaloop-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  mailpit:
    image: axllent/mailpit:latest
    container_name: hexaloop-mailpit
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_HTTP_PORT:-8025}:8025"
    environment:
      MP_MAX_MESSAGES: 5000

  api:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    container_name: hexaloop-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5080
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=${POSTGRES_DB:-hexaloop};Username=${POSTGRES_USER:-hexaloop};Password=${POSTGRES_PASSWORD:-hexaloop}
      Jwt__SigningKey: ${HEXALOOP_JWT_SIGNINGKEY:-dev-only-signing-key-please-replace-32-chars-min}
      Redis__ConnectionString: redis:6379
      Smtp__Host: mailpit
      Smtp__Port: "1025"
      Smtp__FromAddress: ${HEXALOOP_SMTP_FROM:-no-reply@hexaloop.dev}
    ports:
      - "${API_PORT:-5080}:5080"

  web:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    container_name: hexaloop-web
    depends_on:
      - api

  caddy:
    image: caddy:latest
    container_name: hexaloop-caddy
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - hexaloop-caddy-data:/data
    depends_on:
      - web

volumes:
  hexaloop-pgdata:
  hexaloop-caddy-data:
